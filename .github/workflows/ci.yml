name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.17.0-dev.813+2153f8143

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: ~/.cache/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('.zig-cache/never_was_here') }}
          enable-cross-os-cache: true

      - name: Install SQLite (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Check formatting
        run: zig fmt --check src examples tests build.zig

      - name: Build
        run: zig build

      - name: Unit tests
        run: zig build test --summary all

      - name: Integration tests (SQLite)
        run: zig build test-integration --summary all
